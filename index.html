<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#1a0a0a">
  <title>Antrenman Takip</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1a0a0a 0%, #2d1515 50%, #1a0a0a 100%);
      min-height: 100vh;
      color: #fff;
      padding: 16px;
      padding-bottom: 100px;
    }
    h1 { text-align: center; color: #ffd5d5; font-size: 24px; margin-bottom: 20px; }
    h2 { color: #ffd5d5; font-size: 20px; margin-bottom: 16px; }
    .back { color: #e85555; font-size: 16px; margin-bottom: 12px; cursor: pointer; display: inline-block; }
    .day-btn {
      background: #2d1515;
      border: 1px solid #5c2020;
      border-radius: 12px;
      padding: 18px 16px;
      margin-bottom: 10px;
      color: #ffd5d5;
      font-size: 18px;
      width: 100%;
      text-align: left;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .day-btn span { color: #e85555; font-size: 14px; }
    .exercise {
      background: #2d1515;
      border-radius: 10px;
      margin-bottom: 10px;
      overflow: hidden;
      border: 1px solid #5c2020;
    }
    .exercise.torba {
      background: #1a1a0a;
      border: 1px solid #5c5c20;
    }
    .exercise-header {
      padding: 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
    }
    .exercise-name { font-weight: 600; font-size: 15px; }
    .exercise-target { color: #9ca3af; font-size: 13px; margin-top: 2px; }
    .exercise-last {
      background: rgba(34,197,94,0.15);
      padding: 10px 14px;
      font-size: 13px;
      color: #22c55e;
      border-top: 1px solid #5c2020;
    }
    .exercise-last strong { color: #4ade80; }
    .exercise-input {
      padding: 12px;
      background: rgba(0,0,0,0.3);
      border-top: 1px solid #5c2020;
    }
    .set-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }
    .set-label {
      width: 45px;
      font-size: 13px;
      color: #e85555;
      font-weight: 600;
    }
    .set-row input {
      width: 55px;
      padding: 10px 4px;
      border-radius: 8px;
      border: 1px solid #5c2020;
      background: #1a0a0a;
      color: #fff;
      font-size: 14px;
      text-align: center;
    }
    .set-row select {
      padding: 10px 4px;
      border-radius: 8px;
      border: 1px solid #5c2020;
      background: #1a0a0a;
      color: #fff;
      font-size: 14px;
    }
    .set-row label {
      font-size: 10px;
      color: #9ca3af;
    }
    .add-set-btn {
      width: 100%;
      padding: 10px;
      background: rgba(232,85,85,0.2);
      border: 1px dashed #e85555;
      border-radius: 8px;
      color: #e85555;
      font-size: 14px;
      cursor: pointer;
      margin-top: 8px;
    }
    .remove-set {
      background: rgba(239,68,68,0.2);
      border: none;
      color: #ef4444;
      width: 28px;
      height: 28px;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
    }
    .save-indicator {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #22c55e;
      color: #fff;
      padding: 10px 20px;
      border-radius: 20px;
      font-size: 14px;
      opacity: 0;
      transition: opacity 0.3s;
      z-index: 100;
    }
    .save-indicator.show { opacity: 1; }
    .arrow { color: #e85555; font-size: 14px; }
    .section-title {
      color: #fbbf24;
      font-size: 14px;
      margin: 16px 0 8px 0;
      padding-left: 4px;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <div id="save-indicator" class="save-indicator">✓ Kaydedildi</div>

  <script>
    const PROGRAM = {
      'Pazartesi - İtiş': [
        { name: 'Bench Press', target: '2×5-6', sets: 2 },
        { name: 'Plate Loaded Incline', target: '2×5-6', sets: 2 },
        { name: 'Chest Fly', target: '1×6-8', sets: 1 },
        { name: 'Shoulder Press Machine', target: '2×6-8', sets: 2 },
        { name: 'Cable Lateral Raise', target: '3×10-12', sets: 3 },
        { name: 'Triceps Pushdown', target: '2×6-8', sets: 2 },
        { name: 'Overhead Extension', target: '2×8-10', sets: 2 },
        { name: 'İp Atlama', target: '5 dk', sets: 1, torba: true },
        { name: 'Kum Torbası - Kroşe', target: '100 tekrar', sets: 1, torba: true },
      ],
      'Salı - Çekiş': [
        { name: 'Barbell Row', target: '3×6-8', sets: 3 },
        { name: 'Lat Pulldown', target: '2×6-8', sets: 2 },
        { name: 'Plate Loaded Row', target: '2×8-10', sets: 2 },
        { name: 'Incline DB Curl', target: '2×6-8', sets: 2 },
        { name: 'Cable Curl', target: '2×6-8', sets: 2 },
        { name: 'Hammer Curl', target: '2×8-10', sets: 2 },
        { name: 'Reverse Curl', target: '2×8-10', sets: 2 },
        { name: 'Face Pull', target: '3×15', sets: 3 },
        { name: 'Cable Crunch', target: '3×10-15', sets: 3 },
        { name: 'İp Atlama', target: '5 dk', sets: 1, torba: true },
        { name: 'Kum Torbası - Mid Kick', target: '100 tekrar', sets: 1, torba: true },
      ],
      'Çarşamba - Bacak': [
        { name: 'Squat', target: '2×6-8', sets: 2 },
        { name: 'Bulgarian Split Squat', target: '2×8-10', sets: 2 },
        { name: 'Leg Extension', target: '2×8-10', sets: 2 },
        { name: 'Leg Curl', target: '3×8-10', sets: 3 },
        { name: 'Calf Raise', target: '3×15-20', sets: 3 },
        { name: 'İp Atlama', target: '5 dk', sets: 1, torba: true },
        { name: 'Kum Torbası - Dirsek', target: '100 tekrar', sets: 1, torba: true },
      ],
      'Cuma - İtiş Omuz': [
        { name: 'Dips', target: '2×6-8', sets: 2 },
        { name: 'Plate Loaded Incline', target: '2×5-6', sets: 2 },
        { name: 'Chest Fly', target: '2×6-8', sets: 2 },
        { name: 'OHP', target: '2×6-8', sets: 2 },
        { name: 'Cable Lateral Raise', target: '3×10-12', sets: 3 },
        { name: 'Rear Delt Fly', target: '2×8-10', sets: 2 },
        { name: 'Triceps Pushdown', target: '2×6-8', sets: 2 },
        { name: 'Face Pull', target: '3×15', sets: 3 },
        { name: 'İp Atlama', target: '5 dk', sets: 1, torba: true },
        { name: 'Kum Torbası - Low Kick', target: '100 tekrar', sets: 1, torba: true },
      ],
      'Cumartesi - Deadlift': [
        { name: 'Deadlift', target: '3×5', sets: 3 },
        { name: 'Weighted Barfiks', target: '2×6-8', sets: 2 },
        { name: 'Cable Row', target: '2×6-8', sets: 2 },
        { name: 'Plate Loaded Row', target: '2×8-10', sets: 2 },
        { name: 'Hammer Curl', target: '2×8-10', sets: 2 },
        { name: 'Cable Crunch', target: '3×10-15', sets: 3 },
        { name: 'Calf Raise', target: '3×15-20', sets: 3 },
        { name: 'İp Atlama', target: '5 dk', sets: 1, torba: true },
        { name: 'Kum Torbası - Direkt', target: '100 tekrar', sets: 1, torba: true },
      ],
    };

    const INITIAL_HISTORY = {
      'Bench Press': { date: '2026-02-16', sets: [{kg:75,rep:6,rir:'0'},{kg:75,rep:6,rir:'0'}] },
      'Plate Loaded Incline': { date: '2026-02-16', sets: [{kg:32.5,rep:6,rir:'0'},{kg:32.5,rep:5,rir:'0'}] },
      'Chest Fly': { date: '2026-02-16', sets: [{kg:60,rep:8,rir:'1.5'},{kg:65,rep:8,rir:'0.5'}] },
      'Shoulder Press Machine': { date: '2026-02-16', sets: [{kg:20,rep:8,rir:'0.5'},{kg:20,rep:8,rir:'0'}] },
      'Cable Lateral Raise': { date: '2026-02-16', sets: [{kg:10,rep:12,rir:'2.5'},{kg:10,rep:12,rir:'1.5'},{kg:10,rep:12,rir:'1'}] },
      'Triceps Pushdown': { date: '2026-02-16', sets: [{kg:68,rep:8,rir:'1'},{kg:68,rep:8,rir:'0'}] },
      'Overhead Extension': { date: '2026-02-16', sets: [{kg:36.5,rep:10,rir:'0'},{kg:36.5,rep:10,rir:'0'}] },
      'Barbell Row': { date: '2026-02-17', sets: [{kg:65,rep:8,rir:'2'},{kg:65,rep:8,rir:'1.5'},{kg:65,rep:8,rir:'1'}] },
      'Lat Pulldown': { date: '2026-02-17', sets: [{kg:70,rep:8,rir:'0'},{kg:70,rep:8,rir:'0'}] },
      'Plate Loaded Row': { date: '2026-02-17', sets: [{kg:45,rep:8,rir:'0'},{kg:45,rep:8,rir:'0'}] },
      'Incline DB Curl': { date: '2026-02-17', sets: [{kg:10,rep:6,rir:'0.5'},{kg:10,rep:6,rir:'0.5'}] },
      'Cable Curl': { date: '2026-02-17', sets: [{kg:45.5,rep:6,rir:'1'},{kg:45.5,rep:8,rir:'0'}] },
      'Hammer Curl': { date: '2026-02-17', sets: [{kg:12.5,rep:9,rir:'0'},{kg:12.5,rep:8,rir:'0'}] },
      'Reverse Curl': { date: '2026-02-17', sets: [{kg:20,rep:10,rir:'0'},{kg:20,rep:8,rir:'0'}] },
      'Face Pull': { date: '2026-02-17', sets: [{kg:36.5,rep:15,rir:'2'},{kg:36.5,rep:15,rir:'1'},{kg:36.5,rep:15,rir:'1'}] },
      'Squat': { date: '2026-02-11', sets: [{kg:90,rep:6,rir:''},{kg:90,rep:6,rir:''}] },
      'Bulgarian Split Squat': { date: '2026-02-11', sets: [{kg:10,rep:10,rir:''},{kg:5,rep:10,rir:''}] },
      'Leg Extension': { date: '2026-02-11', sets: [{kg:63,rep:8,rir:''},{kg:63,rep:8,rir:''}] },
      'Leg Curl': { date: '2026-02-11', sets: [{kg:45,rep:10,rir:''},{kg:45,rep:10,rir:''},{kg:45,rep:10,rir:''}] },
      'OHP': { date: '2026-02-14', sets: [{kg:40,rep:8,rir:'0'},{kg:40,rep:6,rir:'0'}] },
      'Rear Delt Fly': { date: '2026-02-14', sets: [{kg:60,rep:10,rir:'0'},{kg:60,rep:10,rir:'0'}] },
      'Deadlift': { date: '2026-02-14', sets: [{kg:115,rep:5,rir:'0'},{kg:115,rep:5,rir:'0'}] },
      'Weighted Barfiks': { date: '', sets: [] },
      'Cable Row': { date: '', sets: [] },
      'Dips': { date: '', sets: [] },
      'Cable Crunch': { date: '2026-02-11', sets: [{kg:68,rep:15,rir:''},{kg:68,rep:15,rir:''},{kg:68,rep:15,rir:''}] },
      'Calf Raise': { date: '2026-02-11', sets: [{kg:20,rep:15,rir:''},{kg:20,rep:15,rir:''},{kg:20,rep:15,rir:''}] },
      'İp Atlama': { date: '', sets: [] },
      'Kum Torbası - Kroşe': { date: '', sets: [] },
      'Kum Torbası - Mid Kick': { date: '', sets: [] },
      'Kum Torbası - Dirsek': { date: '', sets: [] },
      'Kum Torbası - Low Kick': { date: '', sets: [] },
      'Kum Torbası - Direkt': { date: '', sets: [] },
    };

    let currentDay = null;
    let openExercise = null;
    
    let exerciseHistory = JSON.parse(localStorage.getItem('exercise-history-v6') || 'null') || JSON.parse(JSON.stringify(INITIAL_HISTORY));
    let todayData = JSON.parse(localStorage.getItem('today-data-v6') || '{}');

    const RIR_OPTIONS = ['', '0', '0.5', '1', '1.5', '2', '2.5', '3'];

    function save() {
      localStorage.setItem('exercise-history-v6', JSON.stringify(exerciseHistory));
      localStorage.setItem('today-data-v6', JSON.stringify(todayData));
      const indicator = document.getElementById('save-indicator');
      indicator.classList.add('show');
      setTimeout(() => indicator.classList.remove('show'), 1500);
    }

    function formatDate(dateStr) {
      if (!dateStr) return '';
      const d = new Date(dateStr);
      const now = new Date();
      const diff = Math.floor((now - d) / (1000 * 60 * 60 * 24));
      if (diff === 0) return 'Bugün';
      if (diff === 1) return 'Dün';
      return `${diff} gün önce`;
    }

    function getLastRecord(exerciseName) {
      return exerciseHistory[exerciseName] || null;
    }

    function formatLastRecord(record) {
      if (!record || !record.sets || record.sets.length === 0) return null;
      const setsStr = record.sets.map((s) => {
        let str = `${s.kg}kg×${s.rep}`;
        if (s.rir !== '' && s.rir !== undefined) str += ` R${s.rir}`;
        return str;
      }).join(' | ');
      return { text: setsStr, date: formatDate(record.date) };
    }

    function getTodayKey(exerciseName) {
      return exerciseName;
    }

    function getTodaySets(exerciseName, defaultCount) {
      const key = getTodayKey(exerciseName);
      if (todayData[key] && todayData[key].length > 0) return todayData[key];
      const sets = [];
      for (let i = 0; i < defaultCount; i++) {
        sets.push({ kg: '', rep: '', rir: '' });
      }
      return sets;
    }

    function updateSet(exerciseName, setIndex, field, value) {
      const key = getTodayKey(exerciseName);
      if (!todayData[key]) {
        const ex = PROGRAM[currentDay].find(e => e.name === exerciseName);
        todayData[key] = getTodaySets(exerciseName, ex.sets);
      }
      todayData[key][setIndex][field] = value;
      save();
    }

    function addSet(exerciseName) {
      const key = getTodayKey(exerciseName);
      const ex = PROGRAM[currentDay].find(e => e.name === exerciseName);
      if (!todayData[key]) {
        todayData[key] = getTodaySets(exerciseName, ex.sets);
      }
      todayData[key].push({ kg: '', rep: '', rir: '' });
      save();
      renderDay();
    }

    function removeSet(exerciseName, setIndex) {
      const key = getTodayKey(exerciseName);
      if (todayData[key] && todayData[key].length > 1) {
        todayData[key].splice(setIndex, 1);
        save();
        renderDay();
      }
    }

    function saveToHistory(exerciseName) {
      const key = getTodayKey(exerciseName);
      const sets = todayData[key];
      if (sets && sets.some(s => s.kg && s.rep)) {
        const validSets = sets.filter(s => s.kg && s.rep).map(s => ({
          kg: parseFloat(s.kg),
          rep: parseInt(s.rep),
          rir: s.rir
        }));
        if (validSets.length > 0) {
          exerciseHistory[exerciseName] = {
            date: new Date().toISOString().split('T')[0],
            sets: validSets
          };
          delete todayData[key];
          save();
        }
      }
    }

    function renderHome() {
      const app = document.getElementById('app');
      app.innerHTML = `
        <h1>💪 Antrenman Takip</h1>
        ${Object.keys(PROGRAM).map(day => `
          <button class="day-btn" onclick="openDay('${day}')">
            ${day}
            <span>→</span>
          </button>
        `).join('')}
      `;
    }

    function openDay(day) {
      currentDay = day;
      openExercise = null;
      renderDay();
    }

    function goBack() {
      if (openExercise !== null) {
        const ex = PROGRAM[currentDay][openExercise];
        saveToHistory(ex.name);
      }
      currentDay = null;
      renderHome();
    }

    function toggleExercise(index) {
      if (openExercise !== null && openExercise !== index) {
        const ex = PROGRAM[currentDay][openExercise];
        saveToHistory(ex.name);
      }
      openExercise = openExercise === index ? null : index;
      renderDay();
    }

    function renderDay() {
      const exercises = PROGRAM[currentDay];
      const app = document.getElementById('app');
      
      const regularExercises = exercises.filter(e => !e.torba);
      const torbaExercises = exercises.filter(e => e.torba);
      
      app.innerHTML = `
        <div class="back" onclick="goBack()">← Geri</div>
        <h2>${currentDay}</h2>
        ${regularExercises.map((ex, i) => {
          const lastRecord = getLastRecord(ex.name);
          const formatted = formatLastRecord(lastRecord);
          const sets = getTodaySets(ex.name, ex.sets);
          const realIndex = exercises.indexOf(ex);
          const isOpen = openExercise === realIndex;
          
          return `
            <div class="exercise">
              <div class="exercise-header" onclick="toggleExercise(${realIndex})">
                <div>
                  <div class="exercise-name">${ex.name}</div>
                  <div class="exercise-target">${ex.target}</div>
                </div>
                <span class="arrow">${isOpen ? '▼' : '▶'}</span>
              </div>
              ${formatted ? `
                <div class="exercise-last">
                  <strong>${formatted.date}:</strong> ${formatted.text}
                </div>
              ` : ''}
              ${isOpen ? `
                <div class="exercise-input">
                  ${sets.map((set, si) => `
                    <div class="set-row">
                      <span class="set-label">Set ${si + 1}</span>
                      <div>
                        <input type="number" inputmode="decimal" step="0.5" placeholder="kg" value="${set.kg}" 
                          onchange="updateSet('${ex.name}', ${si}, 'kg', this.value)">
                        <label>kg</label>
                      </div>
                      <div>
                        <input type="number" inputmode="numeric" placeholder="rep" value="${set.rep}" 
                          onchange="updateSet('${ex.name}', ${si}, 'rep', this.value)">
                        <label>rep</label>
                      </div>
                      <div>
                        <select onchange="updateSet('${ex.name}', ${si}, 'rir', this.value)">
                          ${RIR_OPTIONS.map(r => `<option value="${r}" ${set.rir == r ? 'selected' : ''}>${r === '' ? 'RIR' : r}</option>`).join('')}
                        </select>
                      </div>
                      <button class="remove-set" onclick="removeSet('${ex.name}', ${si})">×</button>
                    </div>
                  `).join('')}
                  <button class="add-set-btn" onclick="addSet('${ex.name}')">+ Set Ekle</button>
                </div>
              ` : ''}
            </div>
          `;
        }).join('')}
        
        <div class="section-title">🥊 Kum Torbası</div>
        ${torbaExercises.map((ex, i) => {
          const realIndex = exercises.indexOf(ex);
          return `
            <div class="exercise torba">
              <div class="exercise-header">
                <div>
                  <div class="exercise-name">${ex.name}</div>
                  <div class="exercise-target">${ex.target}</div>
                </div>
              </div>
            </div>
          `;
        }).join('')}
      `;
    }

    renderHome();
  </script>
</body>
</html>
